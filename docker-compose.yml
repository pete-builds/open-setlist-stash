x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  tweezer-picks:
    build: .
    image: tweezer-picks:0.2.0
    container_name: tweezer-picks
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16M
    ports:
      - "${APP_PORT:-3706}:${APP_PORT:-3706}"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "${APP_PORT:-3706}"
      TZ: "${TZ:-UTC}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      # Phase 4: join the mcp-phish container's default network so the game
      # can reach `mcp-phish` by name. The game NEVER joins phish-vault_default.
      # Vault reads route through mcp-phish only.
      - mcp-phish
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-m", "tweezer_picks.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  tweezer-picks-resolver:
    # Same image as tweezer-picks; different command. Inside-container loop
    # (PHASE-4-PLAN.md §5 Option B). Sleeps RESOLVER_INTERVAL_SECONDS between
    # ticks. Restart policy + healthcheck restart it on transient failures
    # without scheduling burden on the host.
    build: .
    image: tweezer-picks:0.2.0
    container_name: tweezer-picks-resolver
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16M
    env_file:
      - .env
    environment:
      TZ: "${TZ:-UTC}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - mcp-phish
    entrypoint: ["python", "-m", "tweezer_picks.resolve", "--loop"]
    # The Dockerfile inherits a /healthz HEALTHCHECK from the FastAPI app.
    # The resolver container does not run the HTTP server, so disable it.
    # Container liveness here is "process is running"; tick health is
    # surfaced via /healthz on the main app via scoring_runs.
    healthcheck:
      disable: true
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: tweezer-picks-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${PG_DB:-tweezer_picks}"
      POSTGRES_USER: "${PG_USER:-tweezer_picks}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:?PG_PASSWORD must be set in .env}"
    volumes:
      - tweezer-picks-pg-data:/var/lib/postgresql/data
    # Loopback-only host binding for ad-hoc queries; cross-container traffic
    # uses the docker bridge.
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${PG_USER:-tweezer_picks} -d ${PG_DB:-tweezer_picks}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

volumes:
  tweezer-picks-pg-data:

networks:
  mcp-phish:
    external: true
    name: mcp-phish_default
