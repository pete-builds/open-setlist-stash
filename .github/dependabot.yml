---
version: 2
updates:
- package-ecosystem: pip
  directory: "/"
  schedule:
    interval: weekly
    day: friday
    time: '09:00'
    timezone: America/New_York
  open-pull-requests-limit: 2
  labels:
  - dependencies
  - python
  commit-message:
    prefix: deps
    include: scope
  groups:
    python-minor-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: weekly
    day: friday
    time: '09:00'
    timezone: America/New_York
  open-pull-requests-limit: 1
  labels:
  - dependencies
  - docker
  commit-message:
    prefix: deps(docker)
    include: scope
  ignore:
  - dependency-name: python
    update-types:
    - version-update:semver-major
    - version-update:semver-minor
  groups:
    docker-minor-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
    day: friday
    time: '09:00'
    timezone: America/New_York
  open-pull-requests-limit: 1
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: ci
    include: scope
  groups:
    actions-minor-patch:
      update-types:
      - minor
      - patch
