name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-drift:
    name: Lockfile drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify every pinned dep in source matches the lockfile
        # Deterministic: parses X==Y lines from requirements*.in and verifies
        # the lockfile pins the same version. Does NOT re-resolve, so PyPI
        # publishing new transitive deps between commit and CI is irrelevant.
        # Catches the actual drift: Dependabot bumps the .in but leaves the
        # hash-pinned lockfile behind.
        run: |
          python3 <<'PYEOF'
          import re, sys, pathlib
          PAIRS = [
              ("requirements.in", "requirements.lock"),
              ("requirements-dev.in", "requirements-dev.lock"),
          ]
          def norm(name):
              return re.sub(r"[._-]+", "-", name.lower())
          fail = False
          for src, lock in PAIRS:
              if not pathlib.Path(src).exists() or not pathlib.Path(lock).exists():
                  continue
              lock_text = pathlib.Path(lock).read_text()
              for raw in pathlib.Path(src).read_text().splitlines():
                  line = raw.split("#", 1)[0].strip()
                  if not line or line.startswith(("-r", "-c", "--")):
                      continue
                  m = re.match(r"^([A-Za-z0-9._-]+)(?:\[[^\]]+\])?==(\S+)\s*$", line)
                  if not m:
                      continue
                  pkg, ver = norm(m.group(1)), m.group(2)
                  hit = re.search(rf"(?im)^{re.escape(pkg)}==(\S+?)(?:\s|\\|$)", lock_text)
                  if not hit:
                      print(f"::error file={src}::{m.group(1)}=={ver} pinned in {src} but missing from {lock}")
                      fail = True
                  elif hit.group(1) != ver:
                      print(f"::error file={src}::{m.group(1)}: {src} pins =={ver} but {lock} has =={hit.group(1)}. Regenerate with: uv pip compile {src} -o {lock} --generate-hashes --python-version 3.13 --python-platform linux")
                      fail = True
          sys.exit(1 if fail else 0)
          PYEOF

  lint-and-type:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Hash-pinned install (session 9+). Lockfile is generated on
          # Linux via `uv pip compile --python-version 3.13
          # --python-platform linux --generate-hashes`.
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (strict)
        run: mypy src/setlist_stash

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: setlist_stash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_PG_DSN: postgresql://postgres:test@localhost:5432/setlist_stash_test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Run pytest (with DB-backed tests)
        run: pytest --cov-report=term --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint-and-type, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: setlist-stash:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for scan job
        run: docker save setlist-stash:ci -o /tmp/setlist-stash.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/setlist-stash.tar
          retention-days: 7

  trivy-scan:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/setlist-stash.tar

      - name: Trivy fs scan (Dockerfile + lockfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: setlist-stash:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
