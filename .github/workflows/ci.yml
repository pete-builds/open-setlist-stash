name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Session 9 will switch this to --require-hashes against a
          # generated requirements-dev.lock. Today the .in is the source.
          pip install -r requirements-dev.in
          pip install -e . --no-deps

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (strict)
        run: mypy src/phish_game

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: phish_game_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_PG_DSN: postgresql://postgres:test@localhost:5432/phish_game_test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.in
          pip install -e . --no-deps

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Run pytest (with DB-backed tests)
        run: pytest --cov-report=term --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint-and-type, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: phish-game:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for scan job
        run: docker save phish-game:ci -o /tmp/phish-game.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/phish-game.tar

  trivy-scan:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/phish-game.tar

      - name: Trivy fs scan (Dockerfile + lockfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: phish-game:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
