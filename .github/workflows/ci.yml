name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-drift:
    name: Lockfile drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.8"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Re-compile requirements.lock
        run: |
          uv pip compile requirements.in \
            -o requirements.lock.regen \
            --generate-hashes \
            --python-version 3.13 \
            --python-platform linux \
            --no-header \
            --quiet

      - name: Re-compile requirements-dev.lock
        run: |
          uv pip compile requirements-dev.in \
            -o requirements-dev.lock.regen \
            --generate-hashes \
            --python-version 3.13 \
            --python-platform linux \
            --no-header \
            --quiet

      - name: Fail if lockfiles drifted from .in files
        run: |
          set -e
          drift=0
          if ! diff -q <(tail -n +3 requirements.lock) requirements.lock.regen > /dev/null; then
            echo "::error::requirements.lock is stale. Regenerate with: uv pip compile requirements.in -o requirements.lock --generate-hashes --python-version 3.13 --python-platform linux"
            diff -u <(tail -n +3 requirements.lock) requirements.lock.regen | head -50 || true
            drift=1
          fi
          if ! diff -q <(tail -n +3 requirements-dev.lock) requirements-dev.lock.regen > /dev/null; then
            echo "::error::requirements-dev.lock is stale. Regenerate with: uv pip compile requirements-dev.in -o requirements-dev.lock --generate-hashes --python-version 3.13 --python-platform linux"
            diff -u <(tail -n +3 requirements-dev.lock) requirements-dev.lock.regen | head -50 || true
            drift=1
          fi
          exit $drift

  lint-and-type:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Hash-pinned install (session 9+). Lockfile is generated on
          # Linux via `uv pip compile --python-version 3.13
          # --python-platform linux --generate-hashes`.
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (strict)
        run: mypy src/setlist_stash

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: setlist_stash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_PG_DSN: postgresql://postgres:test@localhost:5432/setlist_stash_test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Run pytest (with DB-backed tests)
        run: pytest --cov-report=term --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint-and-type, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: setlist-stash:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for scan job
        run: docker save setlist-stash:ci -o /tmp/setlist-stash.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/setlist-stash.tar

  trivy-scan:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/setlist-stash.tar

      - name: Trivy fs scan (Dockerfile + lockfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: setlist-stash:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
